name: build

on:
  push:
    branches: [master, claude-integration]
  pull_request:
    branches: [master, claude-integration]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57 # v3.0.0

      - name: Set up NuGet
        uses: NuGet/setup-nuget@b26b823c478ee115be5c9403e62c90b0bf943843 # v3.1.0

      - name: Restore NuGet packages
        run: nuget restore Savedrake.sln

      - name: Build solution (${{ matrix.configuration }})
        run: msbuild Savedrake.sln /p:Configuration=${{ matrix.configuration }} /p:Platform="Any CPU" /m /verbosity:minimal

      - name: Run restore regression harness (${{ matrix.configuration }})
        shell: pwsh
        run: |
          & ".\RestoreHarness\bin\RestoreHarness.exe" "Savedrake v1.2.3\bin\${{ matrix.configuration }}"
          if ($LASTEXITCODE -ne 0) { Write-Error "Restore regression harness FAILED ($LASTEXITCODE)"; exit $LASTEXITCODE }

      - name: Upload Release artifacts
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: savedrake-release
          path: |
            Savedrake v1.2.3/bin/Release/**
            updater/bin/Release/**
          if-no-files-found: warn
          retention-days: 7
