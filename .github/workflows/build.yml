name: build

on:
  push:
    branches: [master, claude-integration]
  pull_request:
    branches: [master, claude-integration]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2

      - name: Set up NuGet
        uses: NuGet/setup-nuget@d105a947828025cd7a980103c35ba2bfae586d0f # v2

      - name: Restore NuGet packages
        run: nuget restore Savedrake.sln

      - name: Build solution (${{ matrix.configuration }})
        run: msbuild Savedrake.sln /p:Configuration=${{ matrix.configuration }} /p:Platform="Any CPU" /m /verbosity:minimal

      - name: Run restore regression harness (${{ matrix.configuration }})
        shell: pwsh
        run: |
          & ".\RestoreHarness\bin\RestoreHarness.exe" "Savedrake v1.2.3\bin\${{ matrix.configuration }}"
          if ($LASTEXITCODE -ne 0) { Write-Error "Restore regression harness FAILED ($LASTEXITCODE)"; exit $LASTEXITCODE }

      - name: Upload Release artifacts
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: savedrake-release
          path: |
            Savedrake v1.2.3/bin/Release/**
            updater/bin/Release/**
          if-no-files-found: warn
          retention-days: 7
