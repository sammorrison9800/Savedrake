name: codeql

on:
  push:
    branches: [master, claude-integration]
  pull_request:
    branches: [master, claude-integration]
  schedule:
    # Weekly scan so newly published query suites catch existing code.
    - cron: '17 9 * * 1'

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: windows-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57 # v3.0.0

      - name: Set up NuGet
        uses: NuGet/setup-nuget@fd55a6f3b34392fa83fde1454582407d8c714123 # v4.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: csharp
          queries: security-and-quality

      - name: Restore NuGet packages
        run: nuget restore Savedrake.sln

      - name: Build solution (Release)
        run: msbuild Savedrake.sln /p:Configuration=Release /p:Platform="Any CPU" /m /verbosity:minimal

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:csharp"
