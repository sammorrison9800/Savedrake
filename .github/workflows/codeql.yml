name: codeql

on:
  push:
    branches: [master, claude-integration]
  pull_request:
    branches: [master, claude-integration]
  schedule:
    # Weekly scan so newly published query suites catch existing code.
    - cron: '17 9 * * 1'

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: windows-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2

      - name: Set up NuGet
        uses: NuGet/setup-nuget@d105a947828025cd7a980103c35ba2bfae586d0f # v2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          languages: csharp
          queries: security-and-quality

      - name: Restore NuGet packages
        run: nuget restore Savedrake.sln

      - name: Build solution (Release)
        run: msbuild Savedrake.sln /p:Configuration=Release /p:Platform="Any CPU" /m /verbosity:minimal

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          category: "/language:csharp"
