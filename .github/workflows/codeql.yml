name: codeql

on:
  push:
    branches: [master, claude-integration]
  pull_request:
    branches: [master, claude-integration]
  schedule:
    # Weekly scan so newly published query suites catch existing code.
    - cron: '17 9 * * 1'

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: windows-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57 # v3.0.0

      - name: Set up NuGet
        uses: NuGet/setup-nuget@b26b823c478ee115be5c9403e62c90b0bf943843 # v3.1.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: csharp
          queries: security-and-quality

      - name: Restore NuGet packages
        run: nuget restore Savedrake.sln

      - name: Build solution (Release)
        run: msbuild Savedrake.sln /p:Configuration=Release /p:Platform="Any CPU" /m /verbosity:minimal

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:csharp"
